# ─── HTTP: redirect to HTTPS + Certbot challenge ───────────────────────────
server {
    listen 80;
    server_name _;

    # Certbot ACME challenge (used during SSL cert issuance)
    location /.well-known/acme-challenge/ {
        root /var/www/certbot;
    }

    # Redirect everything else to HTTPS
    location / {
        return 301 https://$host$request_uri;
    }
}

# ─── HTTPS ──────────────────────────────────────────────────────────────────
server {
    listen 443 ssl;
    server_name DOMAIN_PLACEHOLDER;          # replaced by deploy.sh

    ssl_certificate     /etc/letsencrypt/live/DOMAIN_PLACEHOLDER/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/DOMAIN_PLACEHOLDER/privkey.pem;
    ssl_protocols       TLSv1.2 TLSv1.3;
    ssl_ciphers         HIGH:!aNULL:!MD5;

    client_max_body_size 64M;

    # Pass X-Forwarded-Proto so WordPress knows it's HTTPS
    proxy_set_header Host              $host;
    proxy_set_header X-Real-IP         $remote_addr;
    proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto $scheme;

    # Static assets — cache 30 days
    location ~* \.(css|js|png|jpg|jpeg|gif|ico|svg|woff2?|ttf|otf)$ {
        proxy_pass http://wordpress:80;
        expires 30d;
        add_header Cache-Control "public, no-transform";
    }

    location / {
        proxy_pass http://wordpress:80;
    }
}
