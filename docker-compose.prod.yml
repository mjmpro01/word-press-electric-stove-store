services:

  db:
    image: mysql:8.0
    restart: always
    environment:
      MYSQL_ROOT_PASSWORD: ${DB_ROOT_PASSWORD}
      MYSQL_DATABASE:      ${DB_NAME}
      MYSQL_USER:          ${DB_USER}
      MYSQL_PASSWORD:      ${DB_PASSWORD}
    volumes:
      - db_data:/var/lib/mysql
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost", "-uroot", "-p${DB_ROOT_PASSWORD}"]
      interval: 10s
      timeout: 5s
      retries: 12

  wordpress:
    build:
      context: .
      dockerfile: docker/Dockerfile
    image: kitfix24h:latest
    restart: always
    depends_on:
      db:
        condition: service_healthy
    environment:
      WORDPRESS_DB_HOST:     db
      WORDPRESS_DB_NAME:     ${DB_NAME}
      WORDPRESS_DB_USER:     ${DB_USER}
      WORDPRESS_DB_PASSWORD: ${DB_PASSWORD}
      WORDPRESS_DEBUG:       "0"
      # Tell WordPress its real URL (needed behind Nginx proxy)
      WORDPRESS_CONFIG_EXTRA: >
        define('WP_HOME',    '${SITE_URL}');
        define('WP_SITEURL', '${SITE_URL}');
        define('FORCE_SSL_ADMIN', true);
        $_SERVER['HTTPS'] = 'on';
    volumes:
      - wp_data:/var/www/html
      - wp_uploads:/var/www/html/wp-content/uploads

  nginx:
    image: nginx:1.27-alpine
    restart: always
    depends_on:
      - wordpress
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./docker/nginx.conf:/etc/nginx/conf.d/default.conf:ro
      - certbot_www:/var/www/certbot:ro
      - certbot_conf:/etc/letsencrypt:ro

  certbot:
    image: certbot/certbot:latest
    restart: "no"
    volumes:
      - certbot_www:/var/www/certbot
      - certbot_conf:/etc/letsencrypt

  # Runs once to install/configure WordPress
  wpcli:
    image: wordpress:cli-php8.2
    restart: "no"
    depends_on:
      wordpress:
        condition: service_started
    environment:
      WORDPRESS_DB_HOST:     db
      WORDPRESS_DB_NAME:     ${DB_NAME}
      WORDPRESS_DB_USER:     ${DB_USER}
      WORDPRESS_DB_PASSWORD: ${DB_PASSWORD}
      SITE_URL:              ${SITE_URL}
      WP_ADMIN_USER:         ${WP_ADMIN_USER:-admin}
      WP_ADMIN_PASSWORD:     ${WP_ADMIN_PASSWORD}
      WP_ADMIN_EMAIL:        ${WP_ADMIN_EMAIL}
    volumes:
      - wp_data:/var/www/html
      - ./scripts:/scripts
    entrypoint: ["sh", "/scripts/setup.sh"]
    user: "33:33"

volumes:
  db_data:
  wp_data:
  wp_uploads:
  certbot_www:
  certbot_conf:
